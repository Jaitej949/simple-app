name: Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  # ─────────────────────────────────────────
  # JOB 1: Detect which paths changed
  # ─────────────────────────────────────────
  detect-changes:
    name: Detect Changed Paths
    runs-on: ubuntu-latest
    outputs:
      api: ${{ steps.filter.outputs.api }}
      ui: ${{ steps.filter.outputs.ui }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Check for API or UI changes
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            api:
              - 'simple-app/api/**'
            ui:
              - 'simple-app/ui/**'

  # ─────────────────────────────────────────
  # JOB 2: Deploy API (runs only if API changed)
  # ─────────────────────────────────────────
  deploy-api:
    name: Deploy API (Node/Express)
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.api == 'true'

    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.ROLE_TO_ASSUME }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Deploy API via SSM
        run: |
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "${{ secrets.EC2_INSTANCE_ID }}" \
            --document-name "AWS-RunShellScript" \
            --parameters 'commands=[
              "cd /home/ubuntu/simple-app/simple-app/api",
              "git pull origin main",
              "npm install --production",
              "pm2 restart simple-api --update-env"
            ]' \
            --query "Command.CommandId" \
            --output text)

          echo "Command ID: $COMMAND_ID"

          aws ssm wait command-executed \
            --command-id "$COMMAND_ID" \
            --instance-id "${{ secrets.EC2_INSTANCE_ID }}"

          aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "${{ secrets.EC2_INSTANCE_ID }}" \
            --query "StandardOutputContent" \
            --output text

      - name: Health check
        run: |
          sleep 5
          curl -f http://${{ secrets.EC2_PUBLIC_IP }}/health || exit 1

  # ─────────────────────────────────────────
  # JOB 3: Deploy UI (runs only if UI changed)
  # ─────────────────────────────────────────
  deploy-ui:
    name: Deploy UI (Static/React)
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.ui == 'true'

    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.ROLE_TO_ASSUME }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Deploy UI via SSM
        run: |
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "${{ secrets.EC2_INSTANCE_ID }}" \
            --document-name "AWS-RunShellScript" \
            --parameters 'commands=[
              "cd /home/ubuntu/simple-app/simple-app/ui",
              "git pull origin main",
              "pm2 restart ecosystem.config.js --update-env"
            ]' \
            --query "Command.CommandId" \
            --output text)

          echo "Command ID: $COMMAND_ID"

          aws ssm wait command-executed \
            --command-id "$COMMAND_ID" \
            --instance-id "${{ secrets.EC2_INSTANCE_ID }}"

          aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "${{ secrets.EC2_INSTANCE_ID }}" \
            --query "StandardOutputContent" \
            --output text

      - name: Health check
        run: |
          sleep 5
          curl -f http://${{ secrets.EC2_PUBLIC_IP }} || exit 1
