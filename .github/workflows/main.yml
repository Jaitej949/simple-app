name: Deploy SimpleApp

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:

  # ─────────────────────────────────────────────
  # Detect what changed
  # ─────────────────────────────────────────────
  detect-changes:
    name: Detect Changed Paths
    runs-on: ubuntu-latest
    outputs:
      api: ${{ steps.filter.outputs.api }}
      ui:  ${{ steps.filter.outputs.ui }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Check for API or UI changes
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            api:
              - 'src/api/**'
            ui:
              - 'src/ui/**'

  # ─────────────────────────────────────────────
  # Deploy API — Django
  # ─────────────────────────────────────────────
  deploy-api:
    name: Deploy API (Django)
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.api == 'true'

    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.ROLE_TO_ASSUME }}
          aws-region:     ${{ secrets.AWS_REGION }}

      # Step outputs id so COMMAND_ID is accessible via steps.ssm.outputs.command_id
      - name: Send SSM deploy command
        id: ssm
        run: |
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "${{ secrets.EC2_INSTANCE_ID }}" \
            --document-name "AWS-RunShellScript" \
            --comment "API deploy ${{ github.sha }}" \
            --region "${{ secrets.AWS_REGION }}" \
            --parameters 'commands=[
              "bash -c '\''set -e && export HOME=/home/ubuntu && git config --system --add safe.directory /home/ubuntu/InfraSight360 && echo === API Deploy: $(date) === && cd /home/ubuntu/InfraSight360/src/api && git fetch origin && git reset --hard origin/main && source /home/ubuntu/venv_InfraSight360/bin/activate && pip3 install -r requirements.txt --quiet && python3 manage.py migrate --noinput && sudo supervisorctl restart all && echo === API Deploy Done: $(date) ==='\''"]' \
            --query "Command.CommandId" \
            --output text)

          echo "SSM Command ID: $COMMAND_ID"
          echo "command_id=$COMMAND_ID" >> $GITHUB_OUTPUT

      - name: Wait for command to complete
        run: |
          aws ssm wait command-executed \
            --command-id "${{ steps.ssm.outputs.command_id }}" \
            --instance-id "${{ secrets.EC2_INSTANCE_ID }}" \
            --region "${{ secrets.AWS_REGION }}"

      - name: Show deploy output
        if: always()
        run: |
          aws ssm get-command-invocation \
            --command-id "${{ steps.ssm.outputs.command_id }}" \
            --instance-id "${{ secrets.EC2_INSTANCE_ID }}" \
            --region "${{ secrets.AWS_REGION }}" \
            --query "{Status:Status,Output:StandardOutputContent,Error:StandardErrorContent}" \
            --output json

      - name: Check deploy status
        run: |
          STATUS=$(aws ssm get-command-invocation \
            --command-id "${{ steps.ssm.outputs.command_id }}" \
            --instance-id "${{ secrets.EC2_INSTANCE_ID }}" \
            --region "${{ secrets.AWS_REGION }}" \
            --query "Status" \
            --output text)

          echo "Status: $STATUS"
          [ "$STATUS" = "Success" ] || exit 1

      - name: Health check API
        run: |
          for i in 1 2 3 4 5; do
            sleep 10
            echo "Health check attempt $i/5..."
            if curl --fail --silent --max-time 10 \
              http://${{ secrets.EC2_HOST }}/health; then
              echo "API is healthy"
              exit 0
            fi
            echo "Not ready yet..."
          done
          echo "API health check failed"
          exit 1

  # ─────────────────────────────────────────────
  # Deploy UI — React/Node
  # ─────────────────────────────────────────────
  deploy-ui:
    name: Deploy UI (Node/React)
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.ui == 'true'

    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.ROLE_TO_ASSUME }}
          aws-region:     ${{ secrets.AWS_REGION }}

      - name: Send SSM deploy command
        id: ssm
        run: |
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "${{ secrets.EC2_INSTANCE_ID }}" \
            --document-name "AWS-RunShellScript" \
            --comment "UI deploy ${{ github.sha }}" \
            --region "${{ secrets.AWS_REGION }}" \
            --parameters 'commands=[
              "bash -c '\''set -e && export HOME=/home/ubuntu && export PATH=/usr/bin:/usr/local/bin:$PATH && git config --system --add safe.directory /home/ubuntu/InfraSight360 && echo Node: $(node -v) && echo === UI Deploy: $(date) === && cd /home/ubuntu/InfraSight360/src/ui && git fetch origin && git reset --hard origin/main && npm ci && npm run build && pm2 restart ecosystem.config.js --update-env && pm2 save && sudo nginx -t && sudo systemctl reload nginx && echo === UI Deploy Done: $(date) ==='\''"]' \
            --query "Command.CommandId" \
            --output text)

          echo "SSM Command ID: $COMMAND_ID"
          echo "command_id=$COMMAND_ID" >> $GITHUB_OUTPUT

      - name: Wait for command to complete
        run: |
          aws ssm wait command-executed \
            --command-id "${{ steps.ssm.outputs.command_id }}" \
            --instance-id "${{ secrets.EC2_INSTANCE_ID }}" \
            --region "${{ secrets.AWS_REGION }}"

      - name: Show deploy output
        if: always()
        run: |
          aws ssm get-command-invocation \
            --command-id "${{ steps.ssm.outputs.command_id }}" \
            --instance-id "${{ secrets.EC2_INSTANCE_ID }}" \
            --region "${{ secrets.AWS_REGION }}" \
            --query "{Status:Status,Output:StandardOutputContent,Error:StandardErrorContent}" \
            --output json

      - name: Check deploy status
        run: |
          STATUS=$(aws ssm get-command-invocation \
            --command-id "${{ steps.ssm.outputs.command_id }}" \
            --instance-id "${{ secrets.EC2_INSTANCE_ID }}" \
            --region "${{ secrets.AWS_REGION }}" \
            --query "Status" \
            --output text)

          echo "Status: $STATUS"
          [ "$STATUS" = "Success" ] || exit 1

      - name: Health check UI
        run: |
          for i in 1 2 3 4 5; do
            sleep 10
            echo "Health check attempt $i/5..."
            if curl --fail --silent --max-time 10 \
              http://${{ secrets.EC2_HOST }}; then
              echo "UI is healthy"
              exit 0
            fi
            echo "Not ready yet..."
          done
          echo "UI health check failed"
          exit 1

  # ─────────────────────────────────────────────
  # Summary
  # ─────────────────────────────────────────────
  notify:
    name: Deployment Summary
    runs-on: ubuntu-latest
    needs: [deploy-api, deploy-ui]
    if: always()

    steps:
      - name: Summary
        run: |
          echo "=============================="
          echo "  Deployment Summary"
          echo "=============================="
          echo "Branch: ${{ github.ref_name }}"
          echo "Commit: ${{ github.sha }}"
          echo "Actor:  ${{ github.actor }}"
          echo "API:    ${{ needs.deploy-api.result }}"
          echo "UI:     ${{ needs.deploy-ui.result }}"
          echo "=============================="

          if [ "${{ needs.deploy-api.result }}" = "failure" ] || \
             [ "${{ needs.deploy-ui.result }}" = "failure" ]; then
            echo "One or more deployments FAILED"
            exit 1
          fi

          echo "All deployments succeeded"
